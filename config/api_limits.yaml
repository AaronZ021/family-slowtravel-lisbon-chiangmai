apis:
  google_places:
    enabled: false
    notes: "No API key configured in this environment. Use Google Maps web manual sampling via WebFetch/WebSearch."

  google_geocoding:
    enabled: false
    notes: "No API key. Use approximate coordinates from public sources / map URLs."

  overpass_osm:
    enabled: false
    notes: "Treat as optional. If used, max 2 req/min, small bounded queries only."

  reddit_api:
    enabled: false
    notes: "No OAuth. Use WebSearch with site:reddit.com and WebFetch for individual public threads."

  meteostat:
    enabled: false
    notes: "Use WeatherSpark / timeanddate / Wikipedia climate tables via WebFetch instead."

  openaq:
    enabled: false
    notes: "Use IQAir/WAQI/AirVisual public pages and reputable news via WebFetch."

  iqair:
    enabled: false
    notes: "Use public web pages via WebFetch."

  waqi:
    enabled: false
    notes: "Use public web pages via WebFetch."

request_budget:
  per_city:
    websearch_max: 80
    webfetch_max: 60
  whole_project:
    total_network_requests_max: 400

retry_policy:
  http_429:
    use_retry_after_header: true
    fallback_backoff_seconds: [10, 30, 60, 300]
    max_retries: 4
  http_5xx:
    backoff_seconds: [5, 15, 45]
    max_retries: 3
  http_403_or_captcha_or_login_wall:
    retry: false
    action: mark_inaccessible
  timeout:
    action: reduce_query_scope_and_retry_once

degradation_map:
  google_places: google_maps_web_sampling_or_osm
  overpass: google_maps_web_sampling
  reddit_api: google_search_site_reddit + manual_url_collection
  meteostat: weatherspark_or_timeanddate_or_wikipedia
  openaq: iqair_or_waqi_public_pages
  airbnb_inaccessible: manual_browser_sampling_summary
  facebook_inaccessible: record_group_name_and_public_description_only
